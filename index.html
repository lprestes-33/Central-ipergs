<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width,initial-scale=1,maximum-scale=1"/>
<meta name="theme-color" content="#0b1218"/>
<meta name="apple-mobile-web-app-capable" content="yes"/>
<meta name="apple-mobile-web-app-title" content="SACM"/>
<title>Auditoria — Contas Médicas</title>
<link rel="preconnect" href="https://fonts.googleapis.com"/>
<link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@400;600;700&family=Crimson+Pro:wght@300;400;600&display=swap" rel="stylesheet"/>
<style>
:root{
  --bg:#0b1218;
  --s1:#132030;
  --s2:#1a2c3f;
  --bd:#274d6a;
  --gold:#d4af55;
  --goldl:#f0d478;
  --goldd:rgba(212,175,85,.18);
  --teal:#3dd8d8;
  --teald:rgba(61,216,216,.15);
  --red:#f06060;
  --redd:rgba(240,96,96,.15);
  --green:#52c989;
  --greend:rgba(82,201,137,.15);
  --amber:#ffb420;
  --tx:#eaf3fa;
  --txd:#a8c4d8;
  --txm:#5a7f98;
  --r:10px;
}
*{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent}
html,body{height:100%;overflow:hidden;background:var(--bg);color:var(--tx);font-family:'Crimson Pro',Georgia,serif}
body{display:flex;flex-direction:column;height:100dvh}

/* HEADER */
header{
  background:linear-gradient(135deg,#0b1218,#111c26);
  border-bottom:1px solid var(--bd);
  padding:10px 16px;
  display:flex;align-items:center;justify-content:space-between;gap:10px;
  flex-shrink:0;position:relative;z-index:50;
}
header::after{content:'';position:absolute;bottom:0;left:0;right:0;height:1px;background:linear-gradient(90deg,transparent,var(--gold),transparent);opacity:.4}
.logo{display:flex;align-items:center;gap:10px}
.logo-icon{width:34px;height:34px;background:linear-gradient(135deg,var(--gold),#8a6820);border-radius:8px;display:flex;align-items:center;justify-content:center;font-size:17px;box-shadow:0 2px 10px rgba(212,175,85,.3)}
.logo h1{font-family:'Cinzel',serif;font-size:13px;font-weight:700;color:var(--goldl);letter-spacing:2px;line-height:1}
.logo p{font-size:9px;color:var(--txd);letter-spacing:1px;margin-top:2px}
.hbtn{width:34px;height:34px;border:1px solid var(--bd);background:var(--s2);color:var(--txd);border-radius:8px;cursor:pointer;display:flex;align-items:center;justify-content:center;font-size:15px;transition:.2s;flex-shrink:0}
.hbtn:hover{border-color:var(--gold);color:var(--gold)}

/* TABS */
.tabs{background:var(--s1);border-bottom:1px solid var(--bd);display:flex;overflow-x:auto;scrollbar-width:none;flex-shrink:0;padding:0 6px}
.tabs::-webkit-scrollbar{display:none}
.tab{padding:9px 14px;border:none;background:none;color:var(--txm);font-family:'Crimson Pro',serif;font-size:12px;font-weight:600;cursor:pointer;white-space:nowrap;border-bottom:2px solid transparent;transition:.2s;letter-spacing:.5px;position:relative}
.tab .cnt{display:inline-flex;align-items:center;justify-content:center;min-width:16px;height:16px;padding:0 3px;background:var(--s2);border-radius:8px;font-size:9px;margin-left:4px;font-family:sans-serif}
.tab.active{color:var(--goldl);border-bottom-color:var(--gold)}
.tab.active .cnt{background:var(--goldd);color:var(--goldl)}

/* MAIN */
.main{flex:1;overflow:hidden;display:flex}
.area{flex:1;overflow-y:auto;overflow-x:hidden;padding:12px 10px 80px;display:flex;flex-direction:column;gap:10px;-webkit-overflow-scrolling:touch;overscroll-behavior:contain;min-height:0;scrollbar-width:thin;scrollbar-color:var(--bd) transparent}

/* STATS */
.stats{display:grid;grid-template-columns:repeat(4,1fr);gap:6px}
.sc{background:var(--s1);border:1px solid var(--bd);border-radius:var(--r);padding:10px 6px;text-align:center;position:relative;overflow:hidden}
.sc::before{content:'';position:absolute;top:0;left:0;right:0;height:2px}
.sc.t::before{background:var(--teal)}.sc.p::before{background:var(--amber)}.sc.l::before{background:var(--red)}.sc.d::before{background:var(--green)}
.sn{font-family:'Cinzel',serif;font-size:20px;font-weight:700;line-height:1}
.sc.t .sn{color:var(--teal)}.sc.p .sn{color:var(--amber)}.sc.l .sn{color:var(--red)}.sc.d .sn{color:var(--green)}
.sl{font-size:9px;color:var(--txm);margin-top:3px;letter-spacing:1px;font-family:sans-serif;text-transform:uppercase}

/* FILTERS */
.filters{display:flex;gap:6px;flex-wrap:wrap;align-items:center}
.search{flex:1;min-width:120px;padding:6px 10px;background:var(--s1);border:1px solid var(--bd);color:var(--tx);border-radius:20px;font-size:13px;font-family:inherit;outline:none;transition:.2s}
.search:focus{border-color:var(--gold)}
.search::placeholder{color:var(--txm)}
.chip{padding:4px 10px;border:1px solid var(--bd);background:var(--s1);color:var(--txd);border-radius:20px;font-size:11px;cursor:pointer;transition:.2s;font-family:sans-serif;white-space:nowrap}
.chip.on{border-color:var(--gold);color:var(--goldl);background:var(--goldd)}

/* SECTION LABEL */
.sec-lbl{font-family:'Cinzel',serif;font-size:10px;letter-spacing:2px;color:var(--txm);text-transform:uppercase;padding:4px 0;border-bottom:1px solid var(--bd);margin-top:2px}

/* TASK CARD */
.tc{background:var(--s1);border:1px solid var(--bd);border-left:3px solid var(--bd);border-radius:var(--r);padding:10px 10px 10px 12px;display:flex;align-items:flex-start;gap:8px;transition:.2s;width:100%}
.tc.sp{border-left-color:var(--amber)}
.tc.sl2{border-left-color:var(--red)}
.tc.sd{border-left-color:var(--green)}
.tc.st{border-left-color:var(--teal)}
.tc.done{opacity:.5}
.tc:hover{border-color:var(--goldd);border-left-color:var(--gold)}
.chk{width:20px;height:20px;min-width:20px;border:2px solid var(--bd);border-radius:50%;cursor:pointer;display:flex;align-items:center;justify-content:center;transition:.2s;margin-top:2px;flex-shrink:0}
.chk:hover{border-color:var(--green)}
.chk.on{background:var(--green);border-color:var(--green)}
.chk.on::after{content:'✓';color:#fff;font-size:10px;font-family:sans-serif;font-weight:700}
.tb{flex:1;min-width:0;overflow:hidden}
.tt{font-size:13px;font-weight:600;color:#f0f8ff;line-height:1.4;word-break:break-word;overflow-wrap:anywhere}
.done .tt{text-decoration:line-through;color:var(--txm)}
.tm{display:flex;align-items:center;gap:5px;margin-top:4px;flex-wrap:wrap;min-width:0}
.tag{font-size:9px;padding:2px 6px;border-radius:10px;font-family:sans-serif;font-weight:700;letter-spacing:.3px;text-transform:uppercase;white-space:nowrap;flex-shrink:0}
.dl{font-size:10px;color:var(--txd);font-family:sans-serif;white-space:nowrap}
.dl.late{color:var(--red)}.dl.today{color:var(--teal)}.dl.soon{color:var(--amber)}
.ta{display:flex;gap:2px;flex-shrink:0;align-items:flex-start}
.tbtn{width:26px;height:26px;border:none;background:transparent;color:var(--txm);cursor:pointer;border-radius:6px;display:flex;align-items:center;justify-content:center;font-size:12px;transition:.2s;flex-shrink:0}
.tbtn:hover{background:var(--s2);color:var(--tx)}
.tbtn.del:hover{color:var(--red)}

/* SECTION TAG COLORS */
.tg-email{background:rgba(61,216,216,.12);color:#3dd8d8}
.tg-mv{background:rgba(212,175,85,.12);color:#d4af55}
.tg-labimed{background:rgba(160,122,216,.12);color:#a07ad8}
.tg-sargenteacao{background:rgba(255,180,32,.12);color:#ffb420}
.tg-mobilizacao{background:rgba(82,201,137,.12);color:#52c989}
.tg-contrato{background:rgba(240,96,96,.12);color:#f06060}
.tg-lideranca{background:rgba(255,180,90,.12);color:#ffb45a}
.tg-outros{background:rgba(90,127,152,.12);color:#5a7f98}

/* EMPTY */
.empty{text-align:center;padding:48px 20px;color:var(--txm)}
.empty .ei{font-size:40px;margin-bottom:12px;opacity:.4}
.empty p{font-size:14px;line-height:1.7}

/* FAB */
.fab{position:fixed;bottom:22px;right:18px;width:52px;height:52px;background:linear-gradient(135deg,var(--gold),#8a6820);border:none;border-radius:50%;color:#fff;font-size:26px;cursor:pointer;box-shadow:0 4px 20px rgba(212,175,85,.4);display:flex;align-items:center;justify-content:center;transition:.2s;z-index:100;line-height:1}
.fab:hover{transform:scale(1.08);box-shadow:0 6px 28px rgba(212,175,85,.55)}
.fab:active{transform:scale(.95)}

/* FOOTER */
footer{padding:5px 16px;border-top:1px solid var(--bd);background:var(--s1);text-align:center;flex-shrink:0}
footer span{font-size:9px;color:var(--txm);letter-spacing:1.5px;font-family:sans-serif;text-transform:uppercase}
footer b{color:var(--gold)}

/* MODAL */
.ov{position:fixed;inset:0;background:rgba(0,0,0,.8);backdrop-filter:blur(6px);z-index:200;display:none;align-items:center;justify-content:center;padding:16px}
.ov.open{display:flex}
.md{background:var(--s1);border:1px solid var(--bd);border-radius:14px;width:100%;max-width:460px;max-height:90dvh;overflow-y:auto;box-shadow:0 4px 32px rgba(0,0,0,.6);animation:su .25s ease}
@keyframes su{from{transform:translateY(30px);opacity:0}to{transform:translateY(0);opacity:1}}
.mh{padding:16px 18px 12px;border-bottom:1px solid var(--bd);display:flex;align-items:center;justify-content:space-between}
.mt{font-family:'Cinzel',serif;font-size:14px;color:var(--goldl);letter-spacing:1px}
.mc{width:28px;height:28px;border:none;background:transparent;color:var(--txd);font-size:18px;cursor:pointer;border-radius:6px;display:flex;align-items:center;justify-content:center}
.mc:hover{background:var(--s2);color:var(--tx)}
.mb{padding:16px 18px;display:flex;flex-direction:column;gap:12px}
.mf{padding:12px 18px 16px;display:flex;gap:8px;justify-content:flex-end;border-top:1px solid var(--bd)}
.fl{font-size:10px;font-family:sans-serif;font-weight:600;letter-spacing:1px;text-transform:uppercase;color:var(--txm);margin-bottom:4px}
.fi,.fs,.fta{padding:8px 10px;background:var(--bg);border:1px solid var(--bd);color:var(--tx);border-radius:var(--r);font-family:inherit;font-size:13px;outline:none;transition:.2s;width:100%}
.fi:focus,.fs:focus,.fta:focus{border-color:var(--gold)}
.fs{appearance:none;cursor:pointer}
.fta{resize:vertical;min-height:70px}
.btn{padding:8px 18px;border-radius:8px;font-family:'Cinzel',serif;font-size:11px;font-weight:600;letter-spacing:1px;cursor:pointer;border:none;transition:.2s}
.btn-p{background:linear-gradient(135deg,var(--gold),#7a5c18);color:#fff}
.btn-p:hover{opacity:.9;transform:translateY(-1px)}
.btn-g{background:transparent;border:1px solid var(--bd);color:var(--txd)}
.btn-g:hover{border-color:var(--goldd);color:var(--tx)}

/* REPORT */
.rpt-section{background:var(--s1);border:1px solid var(--bd);border-radius:var(--r);overflow:hidden}
.rpt-hd{padding:9px 12px;background:var(--s2);border-bottom:1px solid var(--bd);font-family:'Cinzel',serif;font-size:10px;letter-spacing:2px;color:var(--gold);text-transform:uppercase}
.rpt-row{padding:8px 12px;border-bottom:1px solid var(--bd);display:flex;align-items:center;gap:8px;font-size:12px}
.rpt-row:last-child{border-bottom:none}
.bar-w{flex:1;height:4px;background:var(--bg);border-radius:2px;overflow:hidden}
.bar{height:100%;border-radius:2px;background:var(--gold);transition:width .4s}

/* CHAMADOS */
.ck{background:var(--s1);border:1px solid var(--bd);border-left:3px solid var(--teal);border-radius:var(--r);overflow:hidden;transition:.2s}
.ck.s-aberto{border-left-color:var(--amber)}
.ck.s-andamento{border-left-color:var(--teal)}
.ck.s-resolvido{border-left-color:var(--green)}
.ck.s-fechado{border-left-color:var(--txm)}
.ck-hd{padding:11px 12px;display:flex;align-items:flex-start;gap:8px;cursor:pointer;transition:.2s}
.ck-hd:hover{background:var(--s2)}
.ck-num{font-family:'Cinzel',serif;font-size:10px;color:var(--teal);font-weight:700;white-space:nowrap;margin-top:2px;flex-shrink:0}
.ck-body{flex:1;min-width:0}
.ck-title{font-size:13px;font-weight:600;color:#f0f8ff;line-height:1.3;overflow-wrap:anywhere}
.ck-meta{display:flex;gap:6px;flex-wrap:wrap;margin-top:4px;align-items:center}
.ck-date{font-size:10px;color:var(--txd);font-family:sans-serif}
.ck-badge{font-size:9px;padding:2px 6px;border-radius:8px;font-family:sans-serif;font-weight:700;text-transform:uppercase;white-space:nowrap}
.b-aberto{background:rgba(255,180,32,.15);color:var(--amber)}
.b-andamento{background:rgba(61,216,216,.15);color:var(--teal)}
.b-resolvido{background:rgba(82,201,137,.15);color:var(--green)}
.b-fechado{background:rgba(90,127,152,.15);color:var(--txd)}
.ck-actions{display:flex;gap:2px;flex-shrink:0}
.ck-expand{background:var(--s2);border-top:1px solid var(--bd);padding:12px;display:none;flex-direction:column;gap:10px}
.ck-expand.open{display:flex}

/* TIMELINE */
.tl-title{font-family:'Cinzel',serif;font-size:10px;letter-spacing:2px;color:var(--gold);text-transform:uppercase;padding-bottom:6px;border-bottom:1px solid var(--bd);display:flex;align-items:center;gap:6px;justify-content:space-between}
.tl-title::before{content:'';width:7px;height:7px;border-radius:50%;background:var(--gold);flex-shrink:0;box-shadow:0 0 6px rgba(212,175,85,.5)}
.timeline{display:flex;flex-direction:column;padding-left:6px;position:relative}
.timeline::before{content:'';position:absolute;left:15px;top:10px;bottom:10px;width:2px;background:linear-gradient(to bottom,var(--gold),var(--teal),transparent);opacity:.3;border-radius:2px}
.tl-item{display:flex;gap:8px;position:relative;padding-bottom:12px}
.tl-item:last-child{padding-bottom:2px}
.tl-dot{flex-shrink:0;width:18px;height:18px;border-radius:50%;background:var(--s1);border:2px solid var(--gold);display:flex;align-items:center;justify-content:center;font-size:7px;margin-top:3px;position:relative;z-index:1;box-shadow:0 0 8px rgba(212,175,85,.2)}
.tl-item:first-child .tl-dot{border-color:var(--teal);background:var(--teald);box-shadow:0 0 10px rgba(61,216,216,.3)}
.tl-box{flex:1;min-width:0;background:var(--bg);border:1px solid var(--bd);border-radius:9px;padding:8px 10px;position:relative}
.tl-box::before{content:'';position:absolute;left:-6px;top:9px;width:0;height:0;border-top:5px solid transparent;border-bottom:5px solid transparent;border-right:6px solid var(--bd)}
.tl-box::after{content:'';position:absolute;left:-4px;top:10px;width:0;height:0;border-top:4px solid transparent;border-bottom:4px solid transparent;border-right:5px solid var(--bg)}
.tl-meta{display:flex;align-items:center;justify-content:space-between;margin-bottom:4px}
.tl-date{font-size:10px;font-family:sans-serif;font-weight:700;color:var(--gold)}
.tl-item:first-child .tl-date{color:var(--teal)}
.tl-badge{font-size:9px;padding:1px 6px;border-radius:8px;font-family:sans-serif;font-weight:600;background:var(--goldd);color:var(--goldl)}
.tl-item:first-child .tl-badge{background:var(--teald);color:var(--teal)}
.tl-text{font-size:13px;color:#eaf3fa;line-height:1.5;overflow-wrap:anywhere;padding-right:20px}
.tl-del{position:absolute;top:6px;right:6px;width:20px;height:20px;border:none;background:transparent;color:var(--txm);font-size:10px;cursor:pointer;border-radius:4px;display:flex;align-items:center;justify-content:center;transition:.2s}
.tl-del:hover{background:var(--redd);color:var(--red)}
.tl-empty{padding:14px;background:var(--bg);border:1px dashed var(--bd);border-radius:9px;text-align:center;font-size:12px;color:var(--txm);font-style:italic;line-height:1.6}
.evol-box{background:var(--bg);border:1px dashed var(--bd);border-radius:9px;padding:10px 12px;display:flex;flex-direction:column;gap:7px;transition:.2s}
.evol-box:focus-within{border-color:var(--teal)}
.evol-lbl{font-size:10px;font-family:sans-serif;font-weight:600;color:var(--txm);letter-spacing:1px;text-transform:uppercase}
.evol-ta{padding:8px 10px;background:var(--s1);border:1px solid var(--bd);color:var(--tx);border-radius:8px;font-family:inherit;font-size:13px;resize:vertical;min-height:58px;outline:none;transition:.2s;width:100%}
.evol-ta:focus{border-color:var(--teal)}
.evol-ta::placeholder{color:var(--txm);font-style:italic}
.evol-footer{display:flex;align-items:center;justify-content:space-between;gap:8px}
.evol-now{font-size:10px;font-family:sans-serif;color:var(--txm)}
.evol-btn{padding:7px 14px;background:var(--teald);border:1px solid var(--teal);color:var(--teal);border-radius:8px;font-family:'Cinzel',serif;font-size:10px;letter-spacing:1px;cursor:pointer;transition:.2s;white-space:nowrap}
.evol-btn:hover{background:var(--teal);color:#0b1218;font-weight:700}

/* IMAGES */
.img-grid{display:grid;grid-template-columns:repeat(3,1fr);gap:6px}
.img-thumb{position:relative;aspect-ratio:1;border-radius:7px;overflow:hidden;background:var(--bg);border:1px solid var(--bd);cursor:pointer}
.img-thumb img{width:100%;height:100%;object-fit:cover;display:block}
.img-lbl{position:absolute;bottom:0;left:0;right:0;background:rgba(0,0,0,.7);padding:3px 5px;font-size:9px;color:#fff;font-family:sans-serif;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.img-del-btn{position:absolute;top:3px;right:3px;width:18px;height:18px;background:rgba(240,96,96,.85);border:none;border-radius:50%;color:#fff;font-size:10px;cursor:pointer;display:flex;align-items:center;justify-content:center}
.img-add{aspect-ratio:1;border-radius:7px;border:1px dashed var(--bd);background:var(--bg);color:var(--txm);display:flex;flex-direction:column;align-items:center;justify-content:center;cursor:pointer;font-size:20px;gap:2px;transition:.2s}
.img-add:hover{border-color:var(--gold);color:var(--gold)}
.img-add small{font-size:9px;font-family:sans-serif}

/* IMAGE VIEWER */
.viewer{position:fixed;inset:0;background:rgba(0,0,0,.93);z-index:400;display:none;align-items:center;justify-content:center;flex-direction:column;padding:20px}
.viewer.open{display:flex}
.viewer img{max-width:100%;max-height:70dvh;border-radius:8px;object-fit:contain}
.viewer-cap{margin-top:10px;font-size:13px;color:var(--txd);text-align:center}
.viewer-close{position:absolute;top:16px;right:16px;width:36px;height:36px;background:var(--s2);border:1px solid var(--bd);color:var(--tx);border-radius:50%;font-size:18px;cursor:pointer;display:flex;align-items:center;justify-content:center;border:none}

/* TOAST */
#toasts{position:fixed;top:74px;right:14px;display:flex;flex-direction:column;gap:7px;z-index:500}
.toast{background:var(--s2);border:1px solid var(--bd);border-radius:9px;padding:9px 14px;font-size:13px;display:flex;align-items:center;gap:7px;max-width:270px;box-shadow:0 4px 24px rgba(0,0,0,.5);animation:ti .3s ease}
@keyframes ti{from{transform:translateX(20px);opacity:0}to{transform:translateX(0);opacity:1}}
.toast.warn{border-left:3px solid var(--amber)}
.toast.late{border-left:3px solid var(--red)}
.toast.ok{border-left:3px solid var(--green)}

@media(max-width:400px){.stats{grid-template-columns:repeat(2,1fr)}.sn{font-size:17px}}
</style>
</head>
<body>

<!-- HEADER -->
<header>
  <div class="logo">
    <div class="logo-icon">⚕</div>
    <div>
      <h1>AUDITORIA</h1>
      <p>CONTAS MÉDICAS</p>
    </div>
  </div>
  <div style="display:flex;gap:6px">
    <button class="hbtn" id="notif-btn" onclick="showTab('relatorio')" title="Relatório">🔔</button>
    <button class="hbtn" onclick="showTab('relatorio')" title="Relatório">📊</button>
  </div>
</header>

<!-- TABS -->
<div class="tabs" id="tabs">
  <button class="tab active" data-tab="todas"         onclick="showTab('todas')">Todas <span class="cnt" id="c-todas">0</span></button>
  <button class="tab"        data-tab="email"         onclick="showTab('email')">E-mail <span class="cnt" id="c-email">0</span></button>
  <button class="tab"        data-tab="mv"            onclick="showTab('mv')">MV <span class="cnt" id="c-mv">0</span></button>
  <button class="tab"        data-tab="labimed"       onclick="showTab('labimed')">Labimed <span class="cnt" id="c-labimed">0</span></button>
  <button class="tab"        data-tab="sargenteacao"  onclick="showTab('sargenteacao')">Sargenteação <span class="cnt" id="c-sargenteacao">0</span></button>
  <button class="tab"        data-tab="mobilizacao"   onclick="showTab('mobilizacao')">Mobilização <span class="cnt" id="c-mobilizacao">0</span></button>
  <button class="tab"        data-tab="contrato"      onclick="showTab('contrato')">Contrato <span class="cnt" id="c-contrato">0</span></button>

<!-- ═══ SCRIPT ═══ -->
<script>
'use strict';

// ─── STATE ───────────────────────────────────────────────────
var tasks    = JSON.parse(localStorage.getItem('sacm_tasks')    || '[]');
var chamados = JSON.parse(localStorage.getItem('sacm_chamados') || '[]');
var curTab   = 'todas';
var curFilter= 'all';
var curSearch= '';
var editDemandaId = null;
var editChamadoId = null;
var pendingImg    = null;  // {ticketId, dataUrl}

// ─── SECTIONS ─────────────────────────────────────────────────
var SECS = {
  email:        {label:'E-mail',       cls:'tg-email'},
  mv:           {label:'MV',           cls:'tg-mv'},
  labimed:      {label:'Labimed',      cls:'tg-labimed'},
  sargenteacao: {label:'Sargenteação', cls:'tg-sargenteacao'},
  mobilizacao:  {label:'Mobilização',  cls:'tg-mobilizacao'},
  contrato:     {label:'Contrato',     cls:'tg-contrato'},
  lideranca:    {label:'Liderança',    cls:'tg-lideranca'},
  outros:       {label:'Outros',       cls:'tg-outros'},
};

// ─── PERSISTENCE ─────────────────────────────────────────────
function saveTasks()    { localStorage.setItem('sacm_tasks',    JSON.stringify(tasks)); }
function saveChamados() { localStorage.setItem('sacm_chamados', JSON.stringify(chamados)); }
function genId()        { return Date.now().toString(36) + Math.random().toString(36).slice(2,7); }

// ─── TIME ─────────────────────────────────────────────────────
function nowStr() {
  var d = new Date();
  return d.toLocaleDateString('pt-BR') + ' ' + d.toLocaleTimeString('pt-BR',{hour:'2-digit',minute:'2-digit'});
}

// ─── DEADLINE ─────────────────────────────────────────────────
function dlStatus(dl) {
  if (!dl) return null;
  var diff = dl - Date.now();
  var h = diff / 3600000;
  if (diff < 0)   return 'late';
  if (h < 2)      return 'today';
  if (h < 24)     return 'soon';
  return 'ok';
}
function dlText(dl) {
  if (!dl) return '';
  var d = new Date(dl), now = new Date();
  var diff = dl - Date.now();
  var h = Math.floor(diff / 3600000);
  var m = Math.floor(diff / 60000);
  if (diff < 0) {
    var ah = Math.abs(h);
    return ah < 24 ? '⚠ ' + ah + 'h atrasado' : '⚠ ' + Math.abs(Math.floor(h/24)) + 'd atrasado';
  }
  if (m < 60)  return '⏰ ' + m + 'min';
  if (h < 24)  return '⏰ ' + h + 'h';
  return d.toLocaleDateString('pt-BR',{day:'2-digit',month:'2-digit'}) + ' ' + d.toLocaleTimeString('pt-BR',{hour:'2-digit',minute:'2-digit'});
}

// ─── ESCAPE ───────────────────────────────────────────────────
function esc(s) {
  return String(s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');
}

// ─── MODAL HELPERS ────────────────────────────────────────────
function openModal(id)  { document.getElementById(id).classList.add('open'); }
function closeModal(id) { document.getElementById(id).classList.remove('open'); }

// Close on overlay click
['m-demanda','m-chamado','m-imagem'].forEach(function(id) {
  document.getElementById(id).addEventListener('click', function(e) {
    if (e.target === this) closeModal(id);
  });
});

// ─── TABS ─────────────────────────────────────────────────────
function showTab(tab) {
  curTab    = tab;
  curFilter = 'all';
  curSearch = '';
  document.querySelectorAll('.tab').forEach(function(b) {
    b.classList.toggle('active', b.dataset.tab === tab);
  });
  render();
}

// ─── FAB ──────────────────────────────────────────────────────
function fabClick() {
  if (curTab === 'chamados') { openChamadoModal(); }
  else                       { openDemandaModal(); }
}

// ─── COUNTS ───────────────────────────────────────────────────
function updateCounts() {
  var secKeys = Object.keys(SECS);

  // todas = pending tasks
  set('c-todas', tasks.filter(function(t){return !t.done;}).length);

  secKeys.forEach(function(k) {
    var el = document.getElementById('c-' + k);
    if (el) el.textContent = tasks.filter(function(t){return t.section===k && !t.done;}).length;
  });

  var openCh = chamados.filter(function(c){return c.status==='aberto'||c.status==='andamento';}).length;
  set('c-chamados', openCh);

  // notif badge: count late tasks
  var late = tasks.filter(function(t){return !t.done && dlStatus(t.deadline)==='late';}).length;
  document.getElementById('notif-btn').textContent = late > 0 ? '🔔' + late : '🔔';
}

function set(id, val) {
  var el = document.getElementById(id);
  if (el) el.textContent = val;
}

// ─── MAIN RENDER ──────────────────────────────────────────────
function render() {
  updateCounts();
  var area = document.getElementById('area');
  if (curTab === 'relatorio') { renderReport(area); return; }
  if (curTab === 'chamados')  { renderChamados(area); return; }
  renderDemandas(area);
}

// ─── DEMANDAS ─────────────────────────────────────────────────
function renderDemandas(area) {
  var all = tasks.filter(function(t) {
    if (curTab !== 'todas' && t.section !== curTab) return false;
    if (curFilter === 'pending' && t.done)           return false;
    if (curFilter === 'done'    && !t.done)          return false;
    if (curFilter === 'late') {
      if (t.done || dlStatus(t.deadline) !== 'late') return false;
    }
    if (curSearch) {
      var q = curSearch.toLowerCase();
      if (!(t.desc||'').toLowerCase().includes(q) && !(t.obs||'').toLowerCase().includes(q)) return false;
    }
    return true;
  });

  all.sort(function(a,b) {
    if (a.done !== b.done) return a.done ? 1 : -1;
    var order = {late:0,today:1,soon:2,ok:3};
    var sa = dlStatus(a.deadline), sb = dlStatus(b.deadline);
    return (order[sa]||4) - (order[sb]||4);
  });

  var scope   = curTab === 'todas' ? tasks : tasks.filter(function(t){return t.section===curTab;});
  var total   = scope.length;
  var pending = scope.filter(function(t){return !t.done;}).length;
  var late    = scope.filter(function(t){return !t.done && dlStatus(t.deadline)==='late';}).length;
  var done    = scope.filter(function(t){return t.done;}).length;

  var html = '<div class="stats">'
    + '<div class="sc t"><div class="sn">' + total   + '</div><div class="sl">Total</div></div>'
    + '<div class="sc p"><div class="sn">' + pending + '</div><div class="sl">Pendentes</div></div>'
    + '<div class="sc l"><div class="sn">' + late    + '</div><div class="sl">Atrasadas</div></div>'
    + '<div class="sc d"><div class="sn">' + done    + '</div><div class="sl">Concluídas</div></div>'
    + '</div>'
    + '<div class="filters">'
    + '<input class="search" type="search" placeholder="🔍 Buscar..." value="' + esc(curSearch) + '" oninput="onSearch(this.value)"/>'
    + '<button class="chip' + (curFilter==='all'     ? ' on':'') + '" onclick="setFilter(\'all\')">Todas</button>'
    + '<button class="chip' + (curFilter==='pending' ? ' on':'') + '" onclick="setFilter(\'pending\')">Pendentes</button>'
    + '<button class="chip' + (curFilter==='late'    ? ' on':'') + '" onclick="setFilter(\'late\')">Atrasadas</button>'
    + '<button class="chip' + (curFilter==='done'    ? ' on':'') + '" onclick="setFilter(\'done\')">Concluídas</button>'
    + '</div>';

  if (all.length === 0) {
    html += '<div class="empty"><div class="ei">📋</div><p>Nenhuma demanda encontrada.<br>Toque em <b>+</b> para adicionar.</p></div>';
  } else if (curTab === 'todas') {
    var bySection = {};
    all.forEach(function(t) {
      if (!bySection[t.section]) bySection[t.section] = [];
      bySection[t.section].push(t);
    });
    Object.keys(bySection).forEach(function(sec) {
      html += '<div class="sec-lbl">' + (SECS[sec] ? SECS[sec].label : sec) + '</div>';
      bySection[sec].forEach(function(t) { html += taskCard(t); });
    });
  } else {
    all.forEach(function(t) { html += taskCard(t); });
  }

  area.innerHTML = html;
}

function taskCard(t) {
  var ds  = dlStatus(t.deadline);
  var dt  = dlText(t.deadline);
  var sec = SECS[t.section] || {label:t.section, cls:'tg-outros'};
  var cls = t.done ? 'sd' : ds==='late' ? 'sl2' : ds==='today' ? 'st' : ds==='soon' ? 'sp' : '';
  var pri = t.priority==='urgente' ? '🔴 ' : t.priority==='alta' ? '🟠 ' : '';
  return '<div class="tc ' + cls + (t.done?' done':'') + '">'
    + '<div class="chk' + (t.done?' on':'') + '" onclick="toggleDone(\'' + t.id + '\')"></div>'
    + '<div class="tb">'
      + '<div class="tt">' + pri + esc(t.desc) + '</div>'
      + '<div class="tm">'
        + '<span class="tag ' + sec.cls + '">' + sec.label + '</span>'
        + (dt ? '<span class="dl ' + (ds||'') + '">' + dt + '</span>' : '')
        + (t.obs ? '<span style="font-size:10px;color:var(--txm);font-style:italic">' + esc(t.obs.slice(0,28)) + (t.obs.length>28?'…':'') + '</span>' : '')
      + '</div>'
    + '</div>'
    + '<div class="ta">'
      + '<button class="tbtn" onclick="editDemanda(\'' + t.id + '\')">✏️</button>'
      + '<button class="tbtn del" onclick="deleteDemanda(\'' + t.id + '\')">🗑</button>'
    + '</div>'
  + '</div>';
}

function setFilter(f)  { curFilter = f; render(); }
function onSearch(q)   { curSearch = q; render(); }

function toggleDone(id) {
  var t = tasks.find(function(x){return x.id===id;});
  if (!t) return;
  t.done = !t.done;
  if (t.done) t.doneAt = Date.now();
  saveTasks(); render();
  if (t.done) toast('ok','✅ Demanda concluída!');
}

function deleteDemanda(id) {
  if (!confirm('Excluir esta demanda?')) return;
  tasks = tasks.filter(function(x){return x.id!==id;});
  saveTasks(); render();
  toast('ok','🗑 Demanda removida.');
}

// ─── DEMANDA MODAL ────────────────────────────────────────────
function openDemandaModal() {
  editDemandaId = null;
  document.getElementById('m-demanda-title').textContent = 'NOVA DEMANDA';
  document.getElementById('d-desc').value = '';
  document.getElementById('d-sec').value  = (curTab !== 'todas' && curTab !== 'relatorio' && curTab !== 'chamados') ? curTab : 'email';
  document.getElementById('d-prazo').value = '';
  document.getElementById('d-prio').value  = 'normal';
  document.getElementById('d-obs').value   = '';
  openModal('m-demanda');
  setTimeout(function(){ document.getElementById('d-desc').focus(); }, 120);
}

function editDemanda(id) {
  var t = tasks.find(function(x){return x.id===id;});
  if (!t) return;
  editDemandaId = id;
  document.getElementById('m-demanda-title').textContent = 'EDITAR DEMANDA';
  document.getElementById('d-desc').value  = t.desc;
  document.getElementById('d-sec').value   = t.section;
  document.getElementById('d-prazo').value = t.deadline ? new Date(t.deadline).toISOString().slice(0,16) : '';
  document.getElementById('d-prio').value  = t.priority || 'normal';
  document.getElementById('d-obs').value   = t.obs || '';
  openModal('m-demanda');
}

function saveDemanda() {
  var desc = document.getElementById('d-desc').value.trim();
  if (!desc) { toast('warn','⚠ Informe a descrição.'); return; }
  var sec    = document.getElementById('d-sec').value;
  var prazoR = document.getElementById('d-prazo').value;
  var deadline = prazoR ? new Date(prazoR).getTime() : null;
  var prio   = document.getElementById('d-prio').value;
  var obs    = document.getElementById('d-obs').value.trim();

  if (editDemandaId) {
    var t = tasks.find(function(x){return x.id===editDemandaId;});
    if (t) { t.desc=desc; t.section=sec; t.deadline=deadline; t.priority=prio; t.obs=obs; }
  } else {
    tasks.unshift({id:genId(), desc:desc, section:sec, deadline:deadline, priority:prio, obs:obs, done:false, createdAt:Date.now()});
  }
  saveTasks();
  closeModal('m-demanda');
  render();
  toast('ok', editDemandaId ? '✏️ Demanda atualizada!' : '📋 Demanda adicionada!');
}

// ─── CHAMADOS ─────────────────────────────────────────────────
var STS_LABEL = {aberto:'Aberto', andamento:'Em Andamento', resolvido:'Resolvido', fechado:'Fechado'};
var STS_BADGE = {aberto:'b-aberto', andamento:'b-andamento', resolvido:'b-resolvido', fechado:'b-fechado'};
var STS_CARD  = {aberto:'s-aberto', andamento:'s-andamento', resolvido:'s-resolvido', fechado:'s-fechado'};

function renderChamados(area) {
  var total  = chamados.length;
  var aberto = chamados.filter(function(c){return c.status==='aberto';}).length;
  var andand = chamados.filter(function(c){return c.status==='andamento';}).length;
  var resol  = chamados.filter(function(c){return c.status==='resolvido'||c.status==='fechado';}).length;

  var html = '<div class="stats">'
    + '<div class="sc t"><div class="sn" style="color:var(--teal)">' + total  + '</div><div class="sl">Total</div></div>'
    + '<div class="sc p"><div class="sn">'                           + aberto + '</div><div class="sl">Abertos</div></div>'
    + '<div class="sc l"><div class="sn" style="color:var(--teal)">' + andand + '</div><div class="sl">Andamento</div></div>'
    + '<div class="sc d"><div class="sn">'                           + resol  + '</div><div class="sl">Resolvidos</div></div>'
    + '</div>';

  if (chamados.length === 0) {
    html += '<div class="empty"><div class="ei">🎫</div><p>Nenhum chamado MV registrado.<br>Toque em <b>+</b> para adicionar.</p></div>';
  } else {
    var sorted = chamados.slice().sort(function(a,b){return (b.createdAt||0)-(a.createdAt||0);});
    sorted.forEach(function(c){ html += ticketCard(c); });
  }
  area.innerHTML = html;
}

function ticketCard(c) {
  var dateStr = c.date
    ? new Date(c.date).toLocaleString('pt-BR',{day:'2-digit',month:'2-digit',year:'numeric',hour:'2-digit',minute:'2-digit'})
    : '';
  var evolCount = (c.evolucoes||[]).length;
  var imgCount  = (c.images||[]).length;

  // Timeline
  var evolHtml = '';
  if (evolCount > 0) {
    var tl = '';
    var rev = c.evolucoes.slice().reverse();
    rev.forEach(function(e, idx) {
      var realIdx = c.evolucoes.length - 1 - idx;
      var isNew   = idx === 0;
      tl += '<div class="tl-item">'
        + '<div class="tl-dot">' + (isNew ? '●' : '·') + '</div>'
        + '<div class="tl-box">'
          + '<div class="tl-meta">'
            + '<span class="tl-date">📅 ' + esc(e.date) + '</span>'
            + '<span class="tl-badge">' + (isNew ? 'RECENTE' : 'Anterior') + '</span>'
          + '</div>'
          + '<div class="tl-text">' + esc(e.obs) + '</div>'
          + '<button class="tl-del" onclick="delEvol(\'' + c.id + '\',' + realIdx + ',event)" title="Remover">✕</button>'
        + '</div>'
      + '</div>';
    });
    evolHtml = '<div class="timeline">' + tl + '</div>';
  } else {
    evolHtml = '<div class="tl-empty">📋 Nenhuma evolução ainda.<br><small>Registre a primeira atualização abaixo.</small></div>';
  }

  // Images
  var imgHtml = '<div class="img-grid">';
  if (imgCount > 0) {
    c.images.forEach(function(img, idx) {
      imgHtml += '<div class="img-thumb" onclick="viewImg(\'' + c.id + '\',' + idx + ')">'
        + '<img src="' + img.dataUrl + '" alt="' + esc(img.desc) + '"/>'
        + '<div class="img-lbl">' + esc(img.desc || img.date) + '</div>'
        + '<button class="img-del-btn" onclick="delImg(\'' + c.id + '\',' + idx + ',event)">✕</button>'
      + '</div>';
    });
  }
  imgHtml += '<div class="img-add" onclick="triggerImg(\'' + c.id + '\')">'
    + '<span>📷</span><small>Foto</small>'
  + '</div></div>';

  return '<div class="ck ' + (STS_CARD[c.status]||'') + '" id="ck-' + c.id + '">'
    // header
    + '<div class="ck-hd" onclick="toggleTicket(\'' + c.id + '\')">'
      + '<div class="ck-num">#' + esc(c.num||'—') + '</div>'
      + '<div class="ck-body">'
        + '<div class="ck-title">' + esc(c.desc) + '</div>'
        + '<div class="ck-meta">'
          + (dateStr ? '<span class="ck-date">📅 ' + dateStr + '</span>' : '')
          + '<span class="ck-badge ' + (STS_BADGE[c.status]||'') + '">' + (STS_LABEL[c.status]||c.status) + '</span>'
          + (evolCount > 0 ? '<span class="ck-date">💬 ' + evolCount + '</span>' : '')
          + (imgCount  > 0 ? '<span class="ck-date">🖼 ' + imgCount  + '</span>' : '')
        + '</div>'
      + '</div>'
      + '<div class="ck-actions">'
        + '<button class="tbtn" onclick="editChamadoFn(\'' + c.id + '\',event)">✏️</button>'
        + '<button class="tbtn del" onclick="deleteChamadoFn(\'' + c.id + '\',event)">🗑</button>'
      + '</div>'
    + '</div>'
    // expand
    + '<div class="ck-expand" id="exp-' + c.id + '">'
      + '<div class="tl-title"><span>📋 LINHA DO TEMPO</span><small style="font-size:9px;letter-spacing:1px;font-family:sans-serif">' + evolCount + ' REGISTRO(S)</small></div>'
      + evolHtml
      + '<div class="evol-box">'
        + '<div class="evol-lbl">✍ Nova atualização</div>'
        + '<textarea class="evol-ta" id="ei-' + c.id + '" placeholder="Descreva a evolução do chamado..."></textarea>'
        + '<div class="evol-footer">'
          + '<span class="evol-now">🕐 ' + nowStr() + '</span>'
          + '<button class="evol-btn" onclick="addEvol(\'' + c.id + '\')">➕ Registrar</button>'
        + '</div>'
      + '</div>'
      + '<div class="tl-title" style="margin-top:2px">🖼 IMAGENS ANEXADAS</div>'
      + imgHtml
    + '</div>'
  + '</div>';
}

function toggleTicket(id) {
  var el = document.getElementById('exp-' + id);
  if (el) el.classList.toggle('open');
}

// ─── EVOLUÇÃO ─────────────────────────────────────────────────
function addEvol(id) {
  var inp = document.getElementById('ei-' + id);
  var obs = inp ? inp.value.trim() : '';
  if (!obs) { toast('warn','⚠ Informe a observação.'); return; }
  var c = chamados.find(function(x){return x.id===id;});
  if (!c) return;
  if (!c.evolucoes) c.evolucoes = [];
  c.evolucoes.push({date: nowStr(), obs: obs, ts: Date.now()});
  saveChamados();
  toast('ok','💬 Evolução registrada!');
  renderAndReopen('chamados', id);
}

function delEvol(id, idx, e) {
  if (e) e.stopPropagation();
  if (!confirm('Remover esta evolução?')) return;
  var c = chamados.find(function(x){return x.id===id;});
  if (!c || !c.evolucoes) return;
  c.evolucoes.splice(idx, 1);
  saveChamados();
  toast('ok','🗑 Evolução removida.');
  renderAndReopen('chamados', id);
}

// ─── IMAGENS ─────────────────────────────────────────────────
function triggerImg(ticketId) {
  var inp = document.createElement('input');
  inp.type = 'file';
  inp.accept = 'image/*';
  inp.onchange = function(e) {
    var file = e.target.files[0];
    if (!file) return;
    var reader = new FileReader();
    reader.onload = function(ev) {
      pendingImg = {ticketId: ticketId, dataUrl: ev.target.result};
      document.getElementById('img-prev').src = ev.target.result;
      document.getElementById('img-desc').value = '';
      openModal('m-imagem');
    };
    reader.readAsDataURL(file);
  };
  inp.click();
}

function confirmImg() {
  if (!pendingImg) return;
  var c = chamados.find(function(x){return x.id===pendingImg.ticketId;});
  if (!c) return;
  if (!c.images) c.images = [];
  var desc = document.getElementById('img-desc').value.trim();
  c.images.push({dataUrl: pendingImg.dataUrl, desc: desc||'Sem descrição', date: nowStr()});
  saveChamados();
  closeModal('m-imagem');
  pendingImg = null;
  toast('ok','🖼 Imagem adicionada!');
  renderAndReopen('chamados', c.id);
}

function delImg(id, idx, e) {
  if (e) e.stopPropagation();
  var c = chamados.find(function(x){return x.id===id;});
  if (!c || !c.images) return;
  c.images.splice(idx, 1);
  saveChamados();
  renderAndReopen('chamados', id);
}

function viewImg(id, idx) {
  var c = chamados.find(function(x){return x.id===id;});
  if (!c || !c.images || !c.images[idx]) return;
  var img = c.images[idx];
  document.getElementById('viewer-img').src = img.dataUrl;
  document.getElementById('viewer-cap').textContent = (img.desc?img.desc+' · ':'')+img.date;
  document.getElementById('viewer').classList.add('open');
}

function closeViewer() { document.getElementById('viewer').classList.remove('open'); }

// Re-render and reopen a ticket expand panel
function renderAndReopen(tab, id) {
  if (curTab === tab) {
    render();
    setTimeout(function() {
      var el = document.getElementById('exp-' + id);
      if (el) el.classList.add('open');
    }, 60);
  }
}

// ─── CHAMADO MODAL ────────────────────────────────────────────
function openChamadoModal() {
  editChamadoId = null;
  document.getElementById('m-chamado-title').textContent = 'NOVO CHAMADO MV';
  document.getElementById('ch-num').value    = '';
  document.getElementById('ch-desc').value   = '';
  document.getElementById('ch-status').value = 'aberto';
  var now = new Date();
  now.setMinutes(now.getMinutes() - now.getTimezoneOffset());
  document.getElementById('ch-date').value = now.toISOString().slice(0,16);
  openModal('m-chamado');
  setTimeout(function(){ document.getElementById('ch-num').focus(); }, 120);
}

function editChamadoFn(id, e) {
  if (e) e.stopPropagation();
  var c = chamados.find(function(x){return x.id===id;});
  if (!c) return;
  editChamadoId = id;
  document.getElementById('m-chamado-title').textContent = 'EDITAR CHAMADO MV';
  document.getElementById('ch-num').value    = c.num || '';
  document.getElementById('ch-desc').value   = c.desc;
  document.getElementById('ch-status').value = c.status || 'aberto';
  document.getElementById('ch-date').value   = c.date ? new Date(c.date).toISOString().slice(0,16) : '';
  openModal('m-chamado');
}

function saveChamado() {
  var desc = document.getElementById('ch-desc').value.trim();
  if (!desc) { toast('warn','⚠ Informe a descrição.'); return; }
  var num    = document.getElementById('ch-num').value.trim();
  var status = document.getElementById('ch-status').value;
  var dateR  = document.getElementById('ch-date').value;
  var date   = dateR ? new Date(dateR).getTime() : null;

  if (editChamadoId) {
    var c = chamados.find(function(x){return x.id===editChamadoId;});
    if (c) { c.num=num; c.desc=desc; c.status=status; c.date=date; }
  } else {
    chamados.unshift({id:genId(), num:num, desc:desc, status:status, date:date, evolucoes:[], images:[], createdAt:Date.now()});
  }
  saveChamados();
  closeModal('m-chamado');
  updateCounts();
  render();
  toast('ok', editChamadoId ? '✏️ Chamado atualizado!' : '🎫 Chamado registrado!');
}

function deleteChamadoFn(id, e) {
  if (e) e.stopPropagation();
  if (!confirm('Excluir este chamado e todos os seus dados?')) return;
  chamados = chamados.filter(function(x){return x.id!==id;});
  saveChamados();
  updateCounts();
  render();
  toast('ok','🗑 Chamado removido.');
}

// ─── RELATÓRIO ────────────────────────────────────────────────
function renderReport(area) {
  var total   = tasks.length;
  var done    = tasks.filter(function(t){return t.done;}).length;
  var late    = tasks.filter(function(t){return !t.done && dlStatus(t.deadline)==='late';}).length;
  var pending = total - done;

  var pct = function(n) { return total ? Math.round(n/total*100) : 0; };

  var html = '<div style="display:flex;align-items:center;justify-content:space-between;flex-wrap:wrap;gap:8px">'
    + '<span style="font-family:\'Cinzel\',serif;font-size:13px;color:var(--goldl);letter-spacing:1px">📊 RELATÓRIO GERAL</span>'
    + '<button class="btn btn-g" onclick="exportReport()" style="font-size:10px;padding:6px 12px">⬇ Exportar</button>'
    + '</div>'
    + '<div class="rpt-section"><div class="rpt-hd">RESUMO GERAL</div>'
    + rptRow('Total',      total,   100,    'var(--teal)')
    + rptRow('Concluídas', done,    pct(done),    'var(--green)')
    + rptRow('Pendentes',  pending, pct(pending), 'var(--amber)')
    + rptRow('Atrasadas',  late,    pct(late),    'var(--red)')
    + '</div>'
    + '<div class="rpt-section"><div class="rpt-hd">POR SEÇÃO</div>';

  Object.keys(SECS).forEach(function(sec) {
    var s  = tasks.filter(function(t){return t.section===sec;});
    var sd = s.filter(function(t){return t.done;}).length;
    var sl = s.filter(function(t){return !t.done && dlStatus(t.deadline)==='late';}).length;
    if (s.length === 0) return;
    var p = Math.round(sd/s.length*100);
    html += '<div class="rpt-row">'
      + '<span class="tag ' + SECS[sec].cls + '" style="width:86px;text-align:center">' + SECS[sec].label + '</span>'
      + '<div class="bar-w"><div class="bar" style="width:' + p + '%"></div></div>'
      + '<span style="font-size:11px;color:var(--txd)">' + sd + '/' + s.length + '</span>'
      + (sl>0 ? '<span style="color:var(--red);font-size:10px">⚠' + sl + '</span>' : '')
    + '</div>';
  });

  // Chamados summary
  var chTotal = chamados.length;
  var chOpen  = chamados.filter(function(c){return c.status==='aberto'||c.status==='andamento';}).length;
  html += '</div><div class="rpt-section"><div class="rpt-hd">CHAMADOS MV</div>'
    + rptRow('Total', chTotal, 100, 'var(--teal)')
    + rptRow('Abertos/Andamento', chOpen, chTotal?Math.round(chOpen/chTotal*100):0, 'var(--amber)')
    + rptRow('Resolvidos', chTotal-chOpen, chTotal?Math.round((chTotal-chOpen)/chTotal*100):0, 'var(--green)')
    + '</div>';

  // Recent tasks
  html += '<div class="rpt-section"><div class="rpt-hd">DEMANDAS RECENTES</div>';
  var recent = tasks.slice().sort(function(a,b){return (b.createdAt||0)-(a.createdAt||0);}).slice(0,10);
  if (recent.length === 0) {
    html += '<div class="rpt-row" style="color:var(--txm)">Nenhuma demanda.</div>';
  } else {
    recent.forEach(function(t) {
      var sec = SECS[t.section] || {label:t.section, cls:'tg-outros'};
      var dt  = dlText(t.deadline);
      html += '<div class="rpt-row" style="' + (t.done?'opacity:.5':'') + '">'
        + '<span>' + (t.done?'✅':'⏳') + '</span>'
        + '<span style="flex:1;font-size:12px">' + esc(t.desc.slice(0,38)) + (t.desc.length>38?'…':'') + '</span>'
        + '<span class="tag ' + sec.cls + '">' + sec.label + '</span>'
        + (dt ? '<span class="dl" style="font-size:9px">' + dt + '</span>' : '')
      + '</div>';
    });
  }
  html += '</div>';
  area.innerHTML = html;
}

function rptRow(label, val, pct, color) {
  return '<div class="rpt-row">'
    + '<span style="color:' + color + ';min-width:90px;font-size:12px">' + label + '</span>'
    + '<div class="bar-w"><div class="bar" style="width:' + pct + '%;background:' + color + '"></div></div>'
    + '<strong style="font-size:12px">' + val + '</strong>'
  + '</div>';
}

function exportReport() {
  var date = new Date().toLocaleDateString('pt-BR');
  var txt = 'RELATÓRIO – AUDITORIA E CONTAS MÉDICAS\nGerado em: ' + date + '\n\n';
  txt += 'TOTAIS\nTotal: ' + tasks.length
    + ' | Concluídas: ' + tasks.filter(function(t){return t.done;}).length
    + ' | Pendentes: '  + tasks.filter(function(t){return !t.done;}).length
    + ' | Atrasadas: '  + tasks.filter(function(t){return !t.done&&dlStatus(t.deadline)==='late';}).length + '\n\n';

  Object.keys(SECS).forEach(function(sec) {
    var s = tasks.filter(function(t){return t.section===sec;});
    if (s.length===0) return;
    txt += '─── ' + SECS[sec].label.toUpperCase() + ' ───\n';
    s.forEach(function(t) {
      var dl = t.deadline ? new Date(t.deadline).toLocaleString('pt-BR') : '—';
      var st = t.done ? '[✓]' : dlStatus(t.deadline)==='late' ? '[ATRASADO]' : '[PENDENTE]';
      txt += st + ' ' + t.desc + '\n    Prazo: ' + dl + (t.obs?' | Obs: '+t.obs:'') + '\n';
    });
    txt += '\n';
  });

  txt += '─── CHAMADOS MV ───\n';
  chamados.forEach(function(c) {
    txt += '[' + (STS_LABEL[c.status]||c.status) + '] #' + (c.num||'—') + ' ' + c.desc + '\n';
    (c.evolucoes||[]).forEach(function(e){ txt += '  • ' + e.date + ': ' + e.obs + '\n'; });
  });

  txt += '\nDesenvolvido por lprestes v1.0';
  var blob = new Blob([txt], {type:'text/plain;charset=utf-8'});
  var a = document.createElement('a');
  a.href = URL.createObjectURL(blob);
  a.download = 'relatorio_' + date.replace(/\//g,'_') + '.txt';
  a.click();
}

// ─── NOTIFICATIONS & BELL ────────────────────────────────────
var _audioCtx = null;
function bell() {
  try {
    if (!_audioCtx) _audioCtx = new (window.AudioContext||window.webkitAudioContext)();
    var ctx = _audioCtx;
    function tone(f,g,dur,del) {
      var o = ctx.createOscillator(), gn = ctx.createGain();
      o.connect(gn); gn.connect(ctx.destination);
      o.type = 'sine'; o.frequency.setValueAtTime(f, ctx.currentTime+del);
      gn.gain.setValueAtTime(0, ctx.currentTime+del);
      gn.gain.linearRampToValueAtTime(g, ctx.currentTime+del+0.02);
      gn.gain.exponentialRampToValueAtTime(0.001, ctx.currentTime+del+dur);
      o.start(ctx.currentTime+del); o.stop(ctx.currentTime+del+dur+0.1);
    }
    tone(432,0.35,4.5,0); tone(864,0.15,3.8,0); tone(1296,0.08,2.8,0);
    tone(432,0.2,4.0,1.8); tone(864,0.08,3.2,1.8);
  } catch(e){}
}

function checkDeadlines() {
  var now = Date.now();
  tasks.forEach(function(t) {
    if (t.done || !t.deadline) return;
    var diff  = t.deadline - now;
    var diffM = diff / 60000;
    var k60   = 'n60_' + t.id, k30 = 'n30_' + t.id, klt = 'nlt_' + t.id;
    if (diffM<=60&&diffM>55&&!sessionStorage.getItem(k60)) {
      sessionStorage.setItem(k60,'1'); fireAlert(t,'60 minutos');
    } else if (diffM<=30&&diffM>25&&!sessionStorage.getItem(k30)) {
      sessionStorage.setItem(k30,'1'); fireAlert(t,'30 minutos');
    } else if (diff<0&&diff>-120000&&!sessionStorage.getItem(klt)) {
      sessionStorage.setItem(klt,'1'); fireAlert(t,null,true);
    }
  });
}

function fireAlert(task, timeLeft, isLate) {
  bell();
  var msg = isLate
    ? '⚠ PRAZO VENCIDO: ' + task.desc.slice(0,35)
    : '🔔 Prazo em ' + timeLeft + ': ' + task.desc.slice(0,30);
  toast(isLate?'late':'warn', msg, 8000);
  if ('Notification' in window && Notification.permission === 'granted') {
    var n = new Notification('Auditoria – Contas Médicas', {body: task.desc});
    setTimeout(function(){n.close();}, 8000);
  }
  updateCounts();
}

if ('Notification' in window) { Notification.requestPermission(); }
setInterval(checkDeadlines, 60000);

// ─── TOAST ───────────────────────────────────────────────────
function toast(type, msg, dur) {
  dur = dur || 3200;
  var c = document.getElementById('toasts');
  var d = document.createElement('div');
  d.className = 'toast ' + (type==='ok'?'ok':type==='warn'?'warn':'late');
  d.textContent = msg;
  c.appendChild(d);
  setTimeout(function() {
    d.style.opacity='0'; d.style.transition='opacity .3s';
    setTimeout(function(){d.remove();}, 350);
  }, dur);
}

// ─── SERVICE WORKER ──────────────────────────────────────────
if ('serviceWorker' in navigator) {
  var swCode = [
    "const C='sacm-v1';",
    "self.addEventListener('install',e=>{e.waitUntil(caches.open(C).then(c=>c.addAll(['./'])).then(()=>self.skipWaiting()))});",
    "self.addEventListener('activate',e=>{e.waitUntil(caches.keys().then(ks=>Promise.all(ks.filter(k=>k!==C).map(k=>caches.delete(k)))).then(()=>self.clients.claim()))});",
    "self.addEventListener('fetch',e=>{if(e.request.method!=='GET')return;e.respondWith(caches.match(e.request).then(r=>r||fetch(e.request).then(res=>{if(res&&res.status===200){var c=res.clone();caches.open(C).then(ca=>ca.put(e.request,c))}return res}).catch(()=>caches.match('./'))))});"
  ].join('\n');
  var blob = new Blob([swCode], {type:'application/javascript'});
  navigator.serviceWorker.register(URL.createObjectURL(blob)).catch(function(){});
}

// ─── INIT ────────────────────────────────────────────────────
render();
</script>
