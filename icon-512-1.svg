<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512" width="512" height="512">
  <defs>

    <!-- Fundo escuro quase preto -->
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#060d1a"/>
      <stop offset="100%" stop-color="#0a1628"/>
    </linearGradient>

    <!-- Cruz: ciano elétrico → azul vibrante -->
    <linearGradient id="crossH" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%"   stop-color="#00e5ff"/>
      <stop offset="50%"  stop-color="#38bdf8"/>
      <stop offset="100%" stop-color="#818cf8"/>
    </linearGradient>
    <linearGradient id="crossV" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%"   stop-color="#818cf8"/>
      <stop offset="50%"  stop-color="#38bdf8"/>
      <stop offset="100%" stop-color="#00e5ff"/>
    </linearGradient>

    <!-- Anel orbital roxo -->
    <linearGradient id="ring1" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%"   stop-color="#a855f7" stop-opacity="0.9"/>
      <stop offset="100%" stop-color="#a855f7" stop-opacity="0"/>
    </linearGradient>

    <!-- Anel orbital ciano -->
    <linearGradient id="ring2" x1="1" y1="0" x2="0" y2="1">
      <stop offset="0%"   stop-color="#00e5ff" stop-opacity="0.8"/>
      <stop offset="100%" stop-color="#00e5ff" stop-opacity="0"/>
    </linearGradient>

    <!-- Glow neon da cruz -->
    <filter id="neon" x="-40%" y="-40%" width="180%" height="180%">
      <feGaussianBlur stdDeviation="14" result="blur1"/>
      <feGaussianBlur stdDeviation="5"  result="blur2"/>
      <feMerge>
        <feMergeNode in="blur1"/>
        <feMergeNode in="blur2"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>

    <!-- Glow suave dos anéis -->
    <filter id="ringGlow" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur stdDeviation="6" result="b"/>
      <feMerge><feMergeNode in="b"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>

    <!-- Clip round -->
    <clipPath id="clip">
      <rect width="512" height="512" rx="112"/>
    </clipPath>

  </defs>

  <!-- Fundo -->
  <rect width="512" height="512" rx="112" fill="url(#bg)"/>

  <!-- Grade de pontos sutil (textura tech) -->
  <g opacity="0.07" clip-path="url(#clip)">
    <pattern id="dots" x="0" y="0" width="32" height="32" patternUnits="userSpaceOnUse">
      <circle cx="16" cy="16" r="1.8" fill="#38bdf8"/>
    </pattern>
    <rect width="512" height="512" fill="url(#dots)"/>
  </g>

  <!-- Anel orbital inclinado 1 — roxo -->
  <g filter="url(#ringGlow)" transform="rotate(-35 256 256)">
    <ellipse cx="256" cy="256" rx="210" ry="72"
      fill="none" stroke="url(#ring1)" stroke-width="3" stroke-dasharray="60 30"/>
  </g>

  <!-- Anel orbital inclinado 2 — ciano -->
  <g filter="url(#ringGlow)" transform="rotate(25 256 256)">
    <ellipse cx="256" cy="256" rx="185" ry="60"
      fill="none" stroke="url(#ring2)" stroke-width="2" stroke-dasharray="40 50"/>
  </g>

  <!-- Cruz neon — barra horizontal -->
  <rect x="88" y="210" width="336" height="92" rx="26"
    fill="url(#crossH)" filter="url(#neon)" opacity="0.97"/>

  <!-- Cruz neon — barra vertical -->
  <rect x="210" y="88" width="92" height="336" rx="26"
    fill="url(#crossV)" filter="url(#neon)" opacity="0.97"/>

  <!-- Centro: disco brilhante -->
  <circle cx="256" cy="256" r="44" fill="#ffffff" opacity="0.12"/>
  <circle cx="256" cy="256" r="26" fill="#38bdf8" opacity="0.9" filter="url(#neon)"/>
  <circle cx="256" cy="256" r="12" fill="#ffffff"/>

  <!-- 4 vértices angulares (detalhes tech) -->
  <!-- Superior-esquerdo -->
  <line x1="80" y1="80" x2="120" y2="80" stroke="#a855f7" stroke-width="4" stroke-linecap="round" opacity="0.7"/>
  <line x1="80" y1="80" x2="80" y2="120" stroke="#a855f7" stroke-width="4" stroke-linecap="round" opacity="0.7"/>
  <!-- Superior-direito -->
  <line x1="432" y1="80" x2="392" y2="80" stroke="#00e5ff" stroke-width="4" stroke-linecap="round" opacity="0.7"/>
  <line x1="432" y1="80" x2="432" y2="120" stroke="#00e5ff" stroke-width="4" stroke-linecap="round" opacity="0.7"/>
  <!-- Inferior-esquerdo -->
  <line x1="80" y1="432" x2="120" y2="432" stroke="#00e5ff" stroke-width="4" stroke-linecap="round" opacity="0.7"/>
  <line x1="80" y1="432" x2="80" y2="392" stroke="#00e5ff" stroke-width="4" stroke-linecap="round" opacity="0.7"/>
  <!-- Inferior-direito -->
  <line x1="432" y1="432" x2="392" y2="432" stroke="#a855f7" stroke-width="4" stroke-linecap="round" opacity="0.7"/>
  <line x1="432" y1="432" x2="432" y2="392" stroke="#a855f7" stroke-width="4" stroke-linecap="round" opacity="0.7"/>

  <!-- Partículas flutuantes -->
  <circle cx="148" cy="148" r="5" fill="#a855f7" opacity="0.8"/>
  <circle cx="364" cy="148" r="4" fill="#00e5ff" opacity="0.7"/>
  <circle cx="148" cy="364" r="4" fill="#00e5ff" opacity="0.7"/>
  <circle cx="364" cy="364" r="5" fill="#a855f7" opacity="0.8"/>
  <circle cx="256" cy="110" r="3" fill="#ffffff" opacity="0.5"/>
  <circle cx="256" cy="402" r="3" fill="#ffffff" opacity="0.5"/>
  <circle cx="110" cy="256" r="3" fill="#ffffff" opacity="0.5"/>
  <circle cx="402" cy="256" r="3" fill="#ffffff" opacity="0.5"/>

</svg>
