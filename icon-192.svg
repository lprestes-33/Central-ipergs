<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512" width="512" height="512">
  <defs>
    <!-- Gradiente de fundo azul-teal -->
    <linearGradient id="bgGrad" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#0f4c81"/>
      <stop offset="100%" stop-color="#0891b2"/>
    </linearGradient>
    <!-- Brilho interno -->
    <radialGradient id="glow" cx="35%" cy="30%" r="60%">
      <stop offset="0%" stop-color="#38bdf8" stop-opacity="0.25"/>
      <stop offset="100%" stop-color="#0f4c81" stop-opacity="0"/>
    </radialGradient>
    <!-- Sombra da cruz -->
    <filter id="shadow" x="-10%" y="-10%" width="120%" height="120%">
      <feDropShadow dx="0" dy="4" stdDeviation="8" flood-color="#000" flood-opacity="0.25"/>
    </filter>
  </defs>

  <!-- Fundo arredondado com gradiente -->
  <rect width="512" height="512" rx="110" fill="url(#bgGrad)"/>
  <!-- Brilho sutil -->
  <rect width="512" height="512" rx="110" fill="url(#glow)"/>

  <!-- Anel circular decorativo -->
  <circle cx="256" cy="230" r="158" fill="none" stroke="rgba(255,255,255,0.10)" stroke-width="18"/>
  <circle cx="256" cy="230" r="128" fill="rgba(255,255,255,0.05)"/>

  <!-- Cruz médica com sombra -->
  <g filter="url(#shadow)">
    <rect x="210" y="100" width="92" height="260" rx="24" fill="#ffffff"/>
    <rect x="100" y="210" width="312" height="92" rx="24" fill="#ffffff"/>
  </g>

  <!-- Letra C estilizada sobreposta (diferencial) -->
  <path d="M278 175 A82 82 0 1 0 278 285" fill="none"
        stroke="#38bdf8" stroke-width="16" stroke-linecap="round" opacity="0.85"/>

  <!-- Barra inferior -->
  <rect x="60" y="420" width="392" height="6" rx="3" fill="rgba(255,255,255,0.15)"/>

  <!-- Texto CENTRAL -->
  <text x="256" y="482" font-family="Arial, sans-serif" font-size="58"
        font-weight="800" fill="#ffffff" text-anchor="middle"
        letter-spacing="8" opacity="0.95">CENTRAL</text>

  <!-- Ponto de destaque no canto (diferencial do original) -->
  <circle cx="390" cy="122" r="42" fill="#0ea5e9" opacity="0.9"/>
  <circle cx="390" cy="122" r="28" fill="#38bdf8"/>
  <text x="390" y="132" font-family="Arial, sans-serif" font-size="30"
        font-weight="900" fill="#0f2744" text-anchor="middle">+</text>
</svg>
